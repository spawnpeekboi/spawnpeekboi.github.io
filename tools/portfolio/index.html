<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>US Stock Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <header>
        <h1>// portfolio.us :: holdings.json</h1>
        <div class="subtitle">read‑only view · dark IDE layout · live prices</div>
      </header>

      <div class="status-bar" id="status-bar">
        <span class="status-pill ok" id="status-portfolio">portfolio.json: loaded</span>
        <span class="status-pill" id="status-prices">prices: pending</span>
        <span class="status-pill" id="status-updated">updated: --</span>
      </div>

      <div class="layout">
        <div class="left panel">
          <div class="panel-title">
            <span>&lt;holdings&gt;</span>
            <span class="key">ccy:</span><span class="value" id="ccy-label">USD</span>
          </div>
          <div style="overflow-x:auto;">
            <table class="holdings-table" id="holdings-table">
              <thead>
                <tr>
                  <th>symbol</th>
                  <th>shares</th>
                  <th>price</th>
                  <th>value</th>
                </tr>
              </thead>
              <tbody>
                <!-- rows injected here -->
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3">total value</td>
                  <td class="total" id="total-value">--</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        <div class="right panel">
          <div class="panel-title">
            <span>&lt;allocation&gt;</span>
            <span class="key">type:</span><span class="value">pie</span>
          </div>
          <div class="chart-wrapper">
            <canvas id="portfolioChart"></canvas>
          </div>
        </div>
      </div>

      <div class="log-line" id="log-line">
        <span class="log-key">log&gt;</span>
        <span class="log-val"> awaiting data...</span>
      </div>
    </div>
  </div>

  <!-- Your JS -->
  <script src="app.js"></script>
</body>
</html>
