<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>US Stock Portfolio</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Chart.js + Data Labels Plugin for percentage on pie slices -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>
  <header>
    <h1>📈 US Stock Portfolio</h1>
    <p id="last-updated">Loading...</p>
  </header>

  <main>
    <div id="chart-container" style="display:none;">
      <canvas id="portfolioChart"></canvas>
    </div>

    <section id="positions-container" style="display:none;">
      <h2>Positions</h2>
      <div class="header-row">
        <span class="col-symbol">Symbol</span>
        <span class="col-price">Price</span>
        <span class="col-shares">Shares</span>
        <span class="col-value">Total Value</span>
      </div>
      <ul id="stock-list"></ul>
      <div id="portfolio-total"></div>
    </section>

    <section id="error-container" style="display:none;">
      <div id="error-message" class="error"></div>
    </section>
  </main>

  <footer>
    <small>Powered by Finnhub.io | Mobile Friendly | Dark IDE Theme</small>
  </footer>

  <script src="main.js"></script>
</body>
</html>
